services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_WHATSAPP_NUMBER=${PUBLIC_WHATSAPP_NUMBER:-50767890123}
        - PUBLIC_R2_PUBLIC_URL=${PUBLIC_R2_PUBLIC_URL:-}
    container_name: expostands-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data/uploads:/data/uploads:ro
